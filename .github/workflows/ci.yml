name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: setup dafny
        uses: dafny-lang/setup-dafny-action@v1
        with:
          dafny-version: '4.9.0'

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install lemmascript
        run: npm install -g lemmascript

      - run: bun install
      - run: bun run build
      - run: bun run lint
      - run: bun test
      - run: bun run verify
